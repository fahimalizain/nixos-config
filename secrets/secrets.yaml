# sops encrypted secrets
# 
# ENCRYPTION INSTRUCTIONS:
# ========================
# After setting up your age key in .sops.yaml:
# 
#   sops -e -i secrets/secrets.yaml
#
# DECRYPTION DURING REBUILD:
# ==========================
# The nrs/nrb aliases automatically extract the age key from 1Password
# and decrypt this file during the rebuild process.
#
# RUSTDESK SETUP:
# ===============
# 1. Copy your actual RustDesk config files:
#    cat ~/.config/rustdesk/RustDesk.toml >> secrets/secrets.yaml
#    cat ~/.config/rustdesk/RustDesk2.toml >> secrets/secrets.yaml
#
# 2. Format as shown below, then encrypt with sops
#
# 3. During rebuild, these files will be deployed to:
#    - /root/.config/rustdesk/ (for the systemd service)
#
# rustdesk:
#   RustDesk.toml: |
#     enc_id = 'YOUR_ACTUAL_ID_HERE'
#     password = 'YOUR_ACTUAL_PASSWORD_HERE'
#     ... (rest of your config)
#
#   RustDesk2.toml: |
#     ... (your config)
